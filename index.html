<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Elon Musk — EasyPageX</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0a0a0f;
    color:#e0e0e0;
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:40px 20px 60px;
    overflow-x:hidden;
  }

  h1{
    font-family:'Syne',sans-serif;
    font-size:clamp(1.4rem,4vw,2.2rem);
    font-weight:800;
    letter-spacing:.04em;
    text-align:center;
    color:#fff;
    margin-bottom:6px;
  }
  .sub{
    font-family:'Space Mono',monospace;
    font-size:.72rem;
    letter-spacing:.18em;
    color:#4af;
    text-transform:uppercase;
    text-align:center;
    margin-bottom:36px;
  }

  /* ── face container ── */
  .face-wrap{
    position:relative;
    width:260px;
    height:320px;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }

  .face-img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 0 60px rgba(68,170,255,.25);
    display:block;
    transition:filter .15s;
    pointer-events:none;
    position:relative;
    z-index:1;
  }

  /* click flash */
  .face-wrap:active .face-img{filter:brightness(1.25);}

  /* ── sound ripple ── */
  .ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(68,170,255,.35);
    transform:scale(0);
    pointer-events:none;
    z-index:0;
  }
  @keyframes rippleAnim{
    to{transform:scale(4);opacity:0;}
  }

  /* ── globe text ── */
  .globe-wrap{
    margin-top:24px;
    width:260px;
    position:relative;
  }
  .globe-box{
    background:linear-gradient(135deg,#0d1622,#111827);
    border:1px solid #1e3a5f;
    border-radius:14px;
    padding:20px 22px;
    min-height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 30px rgba(68,170,255,.1);
    position:relative;
    overflow:hidden;
  }
  .globe-box::before{
    content:'';
    position:absolute;
    top:-40%;left:-40%;
    width:180%;height:180%;
    background:radial-gradient(ellipse at center,rgba(68,170,255,.05) 0%,transparent 70%);
    animation:spin 12s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .phrase-text{
    font-family:'Space Mono',monospace;
    font-size:.85rem;
    line-height:1.5;
    color:#c8e6ff;
    text-align:center;
    position:relative;
    z-index:1;
    opacity:0;
    transition:opacity .4s;
  }
  .phrase-text.visible{opacity:1;}

  .globe-arrow{
    display:block;
    width:0;height:0;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-bottom:12px solid #1e3a5f;
    margin:0 auto;
  }

  /* ── CTA link ── */
  .cta-link{
    display:inline-block;
    margin-top:32px;
    padding:12px 28px;
    background:linear-gradient(135deg,#1a6bcc,#0e3f80);
    color:#fff;
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:.9rem;
    letter-spacing:.06em;
    border-radius:40px;
    text-decoration:none;
    box-shadow:0 4px 24px rgba(68,170,255,.3);
    transition:transform .2s, box-shadow .2s;
  }
  .cta-link:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(68,170,255,.45);}

  .label-small{
    font-family:'Space Mono',monospace;
    font-size:.62rem;
    letter-spacing:.15em;
    color:#4af;
    text-transform:uppercase;
    margin-top:28px;
    text-align:center;
  }
</style>
</head>

function showNextPhrase(){
  phraseEl.classList.remove('visible');
  setTimeout(()=>{
    phraseEl.textContent = phrases[phraseIdx % phrases.length];
    phraseIdx++;
    phraseEl.classList.add('visible');
  },200);
}

// ── Web Audio classic Mac Boing sound ────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function makeSound(){
  if(!audioCtx) audioCtx = new AudioCtx();
  const ctx = audioCtx;

  function tone(freq, startTime, dur, type='sine', gain=0.4){
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env); env.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    osc.frequency.exponentialRampToValueAtTime(freq*0.85, startTime+dur);
    env.gain.setValueAtTime(0,startTime);
    env.gain.linearRampToValueAtTime(gain, startTime+0.04);
    env.gain.linearRampToValueAtTime(0, startTime+dur);
    osc.start(startTime);
    osc.stop(startTime+dur+0.05);
  }

  const t = ctx.currentTime;

  // Classic Mac "Boing": sine tone that pitch-drops fast,
  // plus a noise transient snap on the attack, slight reverb tail
  const dur = 0.9;

  // ── main boing tone ──
  const osc = ctx.createOscillator();
  const oscEnv = ctx.createGain();
  osc.type = 'sine';
  // start at ~880 Hz, fall quickly to ~110 Hz — the "boing" drop
  osc.frequency.setValueAtTime(880, t);
  osc.frequency.exponentialRampToValueAtTime(110, t + 0.28);
  osc.frequency.exponentialRampToValueAtTime(90, t + dur);
  oscEnv.gain.setValueAtTime(0, t);
  oscEnv.gain.linearRampToValueAtTime(0.5, t + 0.01);
  oscEnv.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(oscEnv); oscEnv.connect(ctx.destination);
  osc.start(t); osc.stop(t + dur + 0.05);

  // ── subtle harmonic (2nd partial) ──
  const osc2 = ctx.createOscillator();
  const env2 = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(1760, t);
  osc2.frequency.exponentialRampToValueAtTime(220, t + 0.22);
  env2.gain.setValueAtTime(0, t);
  env2.gain.linearRampToValueAtTime(0.18, t + 0.01);
  env2.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  osc2.connect(env2); env2.connect(ctx.destination);
  osc2.start(t); osc2.stop(t + 0.55);

  // ── percussive noise snap (attack click) ──
  const snapBuf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
  const snapData = snapBuf.getChannelData(0);
  for(let i = 0; i < snapData.length; i++) snapData[i] = (Math.random() * 2 - 1) * (1 - i / snapData.length);
  const snap = ctx.createBufferSource();
  snap.buffer = snapBuf;
  const snapEnv = ctx.createGain();
  snapEnv.gain.setValueAtTime(0.22, t);
  snapEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  snap.connect(snapEnv); snapEnv.connect(ctx.destination);
  snap.start(t); snap.stop(t + 0.05);
}

// ── ripple animation ──────────────────────────────────────
function triggerRipple(e){
  const wrap = document.getElementById('faceWrap');
  const r = document.getElementById('ripple');
  const rect = wrap.getBoundingClientRect();
  const x = (e.clientX||rect.left+rect.width/2) - rect.left;
  const y = (e.clientY||rect.top+rect.height/2) - rect.top;
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;animation:none;`;
  // force reflow
  r.offsetWidth;
  r.style.animation = 'rippleAnim 0.6s ease-out forwards';
}

let smiling = false;
let smileTimer = null;

function swapToSmile(){
  document.getElementById('elonImg').src = "data:image/jpeg;base64," + IMG2_B64;
  smiling = true;
  if(smileTimer) clearTimeout(smileTimer);
  smileTimer = setTimeout(()=>{
    document.getElementById('elonImg').src = "data:image/jpeg;base64," + IMG_B64;
    smiling = false;
  }, 900);
}

function handleClick(e){
  makeSound();
  triggerRipple(e);
  showNextPhrase();
  swapToSmile();
}
</script>
